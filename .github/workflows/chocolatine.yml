name: Chocolatine
on:
    push:
      branches-ignores:
        "no-ga/"
    pull_request:
      branches-ignores:
        "no-ga/"
env:
  MIRROR_SSH_URL: "git@github.com:Sounay974/push_chocolatine.git"
  MIRROR_SSH_URL_END: "Sounay974/push_chocolatine"
  EXECUTABLES: "chocolatine"

jobs:
    check_repo:
      runs-on: ubuntu-latest
      steps:
        - name: check_mirror_and_repo
          if: ${{ github.repository == env.MIRROR_SSH_URL_END}}
          run: exit 1
    check_compilation_and_coding_style:
        needs: check_repo
        runs-on: ubuntu-latest
        container:
          image: epitechcontent/epitest-docker

        steps:
          - name: checkout_repository
            uses: actions/checkout@v5

          - name: compile
            run: make
            timeout-minutes: 2

          - name: clean
            run: make clean
    push_to_mirror:
          needs: check_compilation_and_coding_style
          runs-on: ubuntu-latest
          steps:
            - name: checkout_repository
              uses: actions/checkout@v5
              with:
                fetch-depth: 0

            - name: push_on_mirror
              uses: pixta-dev/repository-mirroring-action@v1
              with:
                target_repo_url: ${{ env.MIRROR_SSH_URL }}
                ssh_private_key: ${{ secrets.SSH_KEY_PRIVATE }}
