name: Chocolatine
on:
    push:
      branches-ignores:
        "no-ga/"
    pull_request:
      branches-ignores:
        "no-ga/"
env:
  MIRROR: "none"

jobs:
    check_compilation_and_coding_style:
        runs-on: ubuntu-latest
        # runs-on: epitechcontent/epitest-docker
        steps:
          - name: checkout_repository
            uses: actions/checkout@v5

          - name: compile
            run: make
            timeout-minutes: 2

          - name: clean
            run: make clean
